name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
      - run: node --version
      - run: npm --version
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run build
      - run: npm run test
